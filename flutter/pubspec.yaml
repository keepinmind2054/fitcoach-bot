name: fitcoach_bot
description: 🏋️ AI健身小教練 — 7天訓練課程 + Claude AI分析
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # UI
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  table_calendar: ^3.1.2

  # Telegram Mini App integration (web)
  url_launcher: ^6.3.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
